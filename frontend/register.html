<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 · 智慧矿山一张图</title>
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <h1>注册账号</h1>
      <p>仅开放普通用户（值班员）自助注册</p>
    </div>
    <p class="auth-msg" id="auth-msg" role="status"></p>
    <form class="auth-form" id="register-form" autocomplete="on">
      <label>
        <span>用户名</span>
        <input type="text" id="username" name="username" required maxlength="20" placeholder="3～20 位字母/数字/下划线" autocomplete="username" />
      </label>
      <label>
        <span>显示名称（可选）</span>
        <input type="text" id="displayName" name="displayName" maxlength="32" placeholder="默认与用户名相同" />
      </label>
      <label>
        <span>手机号（必填）</span>
        <input type="tel" id="phone" name="phone" required maxlength="11" placeholder="11 位手机号" autocomplete="tel" />
      </label>
      <label>
        <span>密码</span>
        <div class="pwd-row">
          <input type="password" id="password" name="password" required maxlength="64" placeholder="至少 6 位" autocomplete="new-password" />
          <button type="button" class="btn-toggle-pwd" id="toggle-pwd" title="显示/隐藏密码">显示</button>
        </div>
      </label>
      <label>
        <span>确认密码</span>
        <input type="password" id="password2" name="password2" required maxlength="64" placeholder="再次输入密码" autocomplete="new-password" />
      </label>
      <div class="auth-actions">
        <button type="submit" class="auth-btn" id="btn-register">注册</button>
      </div>
    </form>
    <div class="auth-links">
      <a href="./login.html">已有账号？去登录</a>
    </div>
  </div>
  <script type="module" src="./js/register.js"></script>
</body>
</html>
