<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安宁隆瑞采石场 · 智慧矿山一张图</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>
  <div id="boot-error" hidden></div>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1>智慧矿山一张图</h1>
        <p>安宁隆瑞采石场 · 云南省昆明市安宁市县街鸣矣河村</p>
      </div>
      <nav class="nav-tabs">
        <button type="button" class="nav-tab active" data-scroll="sec-map">一张图</button>
        <button type="button" class="nav-tab" data-scroll="sec-env">环境</button>
        <button type="button" class="nav-tab" data-scroll="sec-prod">生产</button>
        <button type="button" class="nav-tab" data-scroll="sec-slope">边坡</button>
        <button type="button" class="nav-tab" data-scroll="sec-video">视频</button>
        <button type="button" class="nav-tab" data-scroll="sec-reserve">储量</button>
      </nav>
      <div class="top-meta">
        <span id="clock">--</span>
        <span class="user-tag">演示账号 · 管理员</span>
      </div>
    </header>

    <main class="workspace">
      <aside class="column left-col" id="left-col">
        <section class="panel" id="sec-env">
          <div class="panel-hd">
            <h2>环境在线监测</h2>
            <span class="sub">历史曲线 · 阈值演示</span>
          </div>
          <div class="panel-bd">
            <div id="env-poll-status" class="poll-ok">环境接口初始化…</div>
            <div id="panel-environment"></div>
            <div class="chart-caption" id="env-chart-caption">历史曲线</div>
            <div class="chart-box" id="chart-env-history"></div>
            <div class="thresh-box" id="panel-env-thresholds"></div>
          </div>
        </section>

        <section class="panel" id="sec-prod">
          <div class="panel-hd">
            <h2>生产工段监控</h2>
            <span class="sub">破碎 / 筛分</span>
          </div>
          <div class="panel-bd" id="panel-production"></div>
        </section>

        <section class="panel">
          <div class="panel-hd">
            <h2>最近报警</h2>
            <span class="sub">本地测试数据</span>
          </div>
          <div class="panel-bd" id="panel-alerts"></div>
        </section>
      </aside>

      <div class="resizer" data-side="left" title="拖拽调节左侧栏宽度，双击收起/展开" role="separator" aria-orientation="vertical"></div>
      <button type="button" class="side-toggle left" id="toggle-left" title="收起左侧栏" aria-pressed="false">⟨</button>

      <section class="center-col" id="sec-map">
        <div class="map-shell">
          <div class="map-overlay left">
            <div class="layer-box" id="layer-box">
              <div class="layer-box-hd">
                <span>图层控制</span>
                <button type="button" class="layer-box-toggle" id="toggle-layer-box" title="收起图层控制" aria-expanded="true" aria-controls="layer-box-body">−</button>
              </div>
              <div class="layer-box-body" id="layer-box-body">
                <label><input type="checkbox" data-layer="environment" checked /> 环境监测</label>
                <label><input type="checkbox" data-layer="slope" checked /> 边坡 / 雨量</label>
                <label><input type="checkbox" data-layer="video" checked /> 视频监控</label>
                <label><input type="checkbox" data-layer="production" checked /> 生产工段</label>
              </div>
            </div>
          </div>
          <div class="map-overlay right">
            <div class="layer-box tool-box" id="tool-box">
              <div class="layer-box-hd">
                <span>工具条</span>
                <button type="button" class="layer-box-toggle" id="toggle-tool-box" title="收起工具条" aria-expanded="true" aria-controls="tool-box-body">−</button>
              </div>
              <div class="layer-box-body" id="tool-box-body">
                <div class="tool-section">
                  <div class="tool-section-title">测量</div>
                  <div class="tool-btn-row">
                    <button type="button" class="tool-btn" data-measure="distance">距离测量</button>
                    <button type="button" class="tool-btn" data-measure="area">面积测量</button>
                  </div>
                  <button type="button" class="tool-btn ghost" data-measure="clear">清除测量</button>
                  <div class="tool-tip" id="measure-tip"></div>
                </div>
                <div class="tool-section">
                  <div class="tool-section-title">底图切换</div>
                  <label class="basemap-option" data-basemap="osm-street">
                    <input type="radio" name="basemap" value="osm-street" />
                    <span class="basemap-label">OSM 城市底图</span>
                    <span class="basemap-zoom" data-zoom-for="osm-street">Z≤19</span>
                  </label>
                  <label class="basemap-option" data-basemap="amap-img">
                    <input type="radio" name="basemap" value="amap-img" />
                    <span class="basemap-label">高德影像底图</span>
                    <span class="basemap-zoom" data-zoom-for="amap-img">Z≤18</span>
                  </label>
                  <label class="basemap-option" data-basemap="esri-street">
                    <input type="radio" name="basemap" value="esri-street" />
                    <span class="basemap-label">ESRI 城市地图</span>
                    <span class="basemap-zoom" data-zoom-for="esri-street">Z≤18</span>
                  </label>
                  <label class="basemap-option" data-basemap="esri-img">
                    <input type="radio" name="basemap" value="esri-img" />
                    <span class="basemap-label">ESRI 影像地图</span>
                    <span class="basemap-zoom" data-zoom-for="esri-img">Z≤17</span>
                  </label>
                  <div class="tool-tip" id="basemap-zoom-tip">当前底图最大切片等级：—</div>
                  <div class="tool-tip warn" id="basemap-tip" hidden></div>
                </div>
              </div>
            </div>
          </div>
          <div id="map"></div>
        </div>
      </section>

      <div class="resizer" data-side="right" title="拖拽调节右侧栏宽度，双击收起/展开" role="separator" aria-orientation="vertical"></div>
      <button type="button" class="side-toggle right" id="toggle-right" title="收起右侧栏" aria-pressed="false">⟩</button>

      <aside class="column right-col" id="right-col">
        <section class="panel" id="sec-slope">
          <div class="panel-hd">
            <h2>边坡与雨量监测</h2>
            <span class="sub" id="slope-updated">—</span>
          </div>
          <div class="panel-bd">
            <div id="slope-poll-status" class="poll-ok">边坡接口初始化…</div>
            <div id="panel-rainfall"></div>
            <div class="chart-box sm" id="chart-rain-trend" title="雨量趋势"></div>
            <div id="panel-slope-list"></div>
            <div class="chart-caption">位移短历史（近端）</div>
            <div class="chart-box" id="chart-slope-trend"></div>
            <div id="panel-slope-actions"></div>
          </div>
        </section>

        <section class="panel" id="sec-reserve">
          <div class="panel-hd">
            <h2>矿区储量分析</h2>
            <span class="sub">动态扣减示意</span>
          </div>
          <div class="panel-bd">
            <div id="panel-reserve-summary"></div>
            <div class="chart-box sm" id="chart-reserve-pie"></div>
            <div class="chart-box sm" id="chart-reserve-trend"></div>
          </div>
        </section>

        <section class="panel" id="sec-video">
          <div class="panel-hd">
            <h2>视频监控</h2>
            <span class="sub">预览占位</span>
          </div>
          <div class="panel-bd">
            <div class="video-grid" id="panel-video"></div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script type="module">
    window.addEventListener('error', (e) => {
      console.error('[page]', e.message, e.filename, e.lineno);
    });
    window.addEventListener('unhandledrejection', (e) => {
      console.error('[promise]', e.reason);
    });
    const boot = () =>
      import('./js/app.js').catch((err) => {
        const box = document.getElementById('boot-error');
        if (box) {
          box.hidden = false;
          box.textContent = '前端脚本加载失败: ' + (err && err.message ? err.message : err);
        }
        console.error(err);
      });
    // 等待 Leaflet / ECharts 就绪后再启动，避免 CDN 偶发延迟
    if (typeof L !== 'undefined' && typeof echarts !== 'undefined') {
      boot();
    } else {
      let n = 0;
      const t = setInterval(() => {
        n += 1;
        if ((typeof L !== 'undefined' && typeof echarts !== 'undefined') || n > 50) {
          clearInterval(t);
          boot();
        }
      }, 100);
    }
  </script>
</body>
</html>
